name: 法考每日资讯（8:30）

on:
  schedule:
    # 北京时间 8:30 = UTC 0:30
    - cron: "30 0 * * *"
  workflow_dispatch:  # 允许手动触发

jobs:
  morning-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning report
        env:
          QQ_SMTP_CODE: ${{ secrets.QQ_SMTP_CODE }}
        run: python morning_report.py
