name: 法考每日一题 v4.0（OAuth2.0 friends_timeline）（8:30）

on:
  schedule:
    # 北京时间 8:30 = UTC 0:30
    - cron: "30 0 * * *"
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  daily-questions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Weibo daily questions（v4.0 OAuth2.0 friends_timeline）
        env:
          QQ_SMTP_CODE: ${{ secrets.QQ_SMTP_CODE }}
          WEIBO_APP_KEY: ${{ secrets.WEIBO_APP_KEY }}
          WEIBO_APP_SECRET: ${{ secrets.WEIBO_APP_SECRET }}
          WEIBO_ACCESS_TOKEN: ${{ secrets.WEIBO_ACCESS_TOKEN }}
        run: python weibo_daily_questions.py

      - name: Commit cache update
        run: |
          git config user.name "Fakao Bot"
          git config user.email "bot@fakao-monitor.local"
          git add weibo_oauth_token.json 2>/dev/null || true
          git add weibo_question_cache.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update weibo caches [skip ci]"
          git push
