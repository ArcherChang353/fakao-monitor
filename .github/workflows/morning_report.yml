name: 法考每日一题 v3.1（跨天缓存Q&A配对）（8:30）

on:
  schedule:
    # 北京时间 8:30 = UTC 0:30
    - cron: "30 0 * * *"
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  daily-questions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (tesseract OCR + Chinese lang)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr tesseract-ocr-chi-sim tesseract-ocr-chi-tra

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Weibo daily questions（v3.1 跨天缓存Q&A配对）
        env:
          QQ_SMTP_CODE: ${{ secrets.QQ_SMTP_CODE }}
          WEIBO_APP_ID: ${{ secrets.WEIBO_APP_ID }}
          WEIBO_APP_SECRET: ${{ secrets.WEIBO_APP_SECRET }}
        run: python weibo_daily_questions.py

      - name: Commit cache update
        run: |
          git config user.name "Fakao Bot"
          git config user.email "bot@fakao-monitor.local"
          git add weibo_search_cache.json
          git add weibo_post_cache.json 2>/dev/null || true
          git add weibo_question_cache.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update weibo caches [skip ci]"
          git push
