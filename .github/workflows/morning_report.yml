name: 法考每日资讯（8:30）

on:
  schedule:
    # 北京时间 8:30 = UTC 0:30
    - cron: "30 0 * * *"
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  morning-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily question monitor（每日一题追踪）
        env:
          QQ_SMTP_CODE: ${{ secrets.QQ_SMTP_CODE }}
        run: python daily_question_monitor.py

      - name: Run morning report（B站动态+法考热点）
        env:
          QQ_SMTP_CODE: ${{ secrets.QQ_SMTP_CODE }}
        run: python morning_report.py

      - name: Commit state update
        run: |
          git config user.name "Fakao Bot"
          git config user.email "bot@fakao-monitor.local"
          git add state_daily_questions.json
          git diff --cached --quiet || git commit -m "chore: update daily question state [skip ci]"
          git push
